services:
  - type: web
    name: research-assistant-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && mkdir -p logs
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/v1/health/live
    autoDeploy: true

    envVars:
      # ── Python runtime ──────────────────────────────────────────────
      - key: PYTHON_VERSION
        value: "3.11.0"

      # ── FastAPI ──────────────────────────────────────────────────────
      - key: FASTAPI_DEBUG
        value: "False"
      - key: FASTAPI_HOST
        value: "0.0.0.0"
      - key: FASTAPI_WORKERS
        value: "1"

      # ── MongoDB Atlas ────────────────────────────────────────────────
      - key: MONGODB_URL
        value: "mongodb+srv://f25607259_db_user:oEikSBY8NFdl0C07@cluster0.or14lgr.mongodb.net/"
      - key: MONGODB_DATABASE
        value: research_assistant_db

      # ── Redis ────────────────────────────────────────────────────────
      #    Not used on Render free tier — Redis features are disabled.
      - key: REDIS_URL
        value: ""
      - key: CACHE_TTL
        value: "86400"

      # ── Sentry ───────────────────────────────────────────────────────
      - key: SENTRY_DSN
        value: "https://46016db8cf493b5b048476345acde2cf@o4510939939405824.ingest.us.sentry.io/4510939943075840"

      # ── OpenRouter LLM ───────────────────────────────────────────────
      #    Set via GitHub secret OPENROUTER_API_KEY — synced by CI deploy job.
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: "https://openrouter.ai/api/v1"

      # ── Agent model selection ────────────────────────────────────────
      - key: RESEARCHER_MODEL
        value: "deepseek/deepseek-chat"
      - key: ANALYST_MODEL
        value: "anthropic/claude-3.5-sonnet"
      - key: FACT_CHECKER_MODEL
        value: "openai/gpt-4o"
      - key: REPORT_GENERATOR_MODEL
        value: "deepseek/deepseek-chat"

      # ── Search APIs ──────────────────────────────────────────────────
      - key: SERPAPI_KEY
        value: "807f64a89c148291ff8f43d98a1be560fbbd1c20"
      - key: NEWSAPI_KEY
        value: "c5a3591304384aa4b481c038d7f71de0"
      - key: GOOGLE_API_KEY
        value: ""
      - key: GOOGLE_SEARCH_ENGINE_ID
        value: "610b6f943aada4559"

      # ── Academic APIs (public, no key needed) ────────────────────────
      - key: ARXIV_API_BASE
        value: "https://export.arxiv.org/api/query"
      - key: PUBMED_API_BASE
        value: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils"
      - key: WIKIPEDIA_API_BASE
        value: "https://en.wikipedia.org/api/rest_v1"

      # ── Security ─────────────────────────────────────────────────────
      - key: SECRET_KEY
        value: "render-research-assistant-secret-key-2024"
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

      # ── CORS — GitHub Pages frontend + local dev ──────────────────────
      - key: ALLOWED_ORIGINS
        value: '["https://waqar-743.github.io","https://waqar-743.github.io/Research_Assistant","http://localhost:5500","http://localhost:3000"]'

      # ── Logging ───────────────────────────────────────────────────────
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_FILE
        value: "logs/app.log"

      # ── Research settings ─────────────────────────────────────────────
      - key: MAX_SOURCES_DEFAULT
        value: "300"
      - key: AGENT_TIMEOUT
        value: "120"
      - key: MAX_RETRIES
        value: "3"
