name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# ─────────────────────────────────────────────
# JOB 1 – Backend tests
# ─────────────────────────────────────────────
jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      OPENROUTER_API_KEY: test-key
      MONGODB_URL: mongodb://localhost:27017
      MONGODB_DATABASE: research_assistant_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest --tb=short -q

# ─────────────────────────────────────────────
# JOB 2 – Frontend build + deploy to GitHub Pages
# ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Sub-path required for GitHub Pages (repo name with exact casing)
          VITE_BASE: /Research_Assistant/
          # Backend URL – set this GitHub secret once you have a Render URL
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # SPA: serve index.html for all unknown routes
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# ─────────────────────────────────────────────
# JOB 3 – Trigger Render backend redeploy
# ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: backend-tests
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.RENDER_DEPLOY_HOOK != ''

    steps:
      - name: Trigger Render deploy hook
        run: curl -fsSL -o /dev/null -w "%{http_code}" "${{ vars.RENDER_DEPLOY_HOOK }}"
